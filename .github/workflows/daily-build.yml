name: Daily Build

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for recent commits
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "过去 24 小时无新提交，跳过构建"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      # ── Android SDK 缓存 ──
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/Sdk/platforms
            ~/.android/Sdk/build-tools
            ~/.android/Sdk/ndk
            ~/.android/Sdk/platform-tools
            ~/.android/Sdk/cmdline-tools
          key: android-sdk-${{ runner.os }}-${{ hashFiles('.github/workflows/daily-build.yml') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Install Android SDK components
        run: |
          SDKM="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKM" --sdk_root="$ANDROID_HOME" --licenses > /dev/null
          "$SDKM" --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-37.0" "build-tools;36.0.0" "build-tools;36.1.0" "ndk;28.2.13676358"

      # ── Gradle 缓存 (替代原来的 actions/cache@v4, 自带远程缓存 + 依赖图加速) ──
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Prepare build files
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: |
            自动每日构建（commit `${{ github.sha }}`）

            > ⚠️ 开发版本，可能不稳定，仅供测试。
          files: app/build/outputs/apk/release/*.apk
