# ═══════════════════════════════════════════════════
# Gradle 性能优化配置 (适用于 CI / 本地 8 核构建)
# ═══════════════════════════════════════════════════

# JVM 堆内存：CI 有 7GB，给 Gradle Daemon 6GB
org.gradle.jvmargs=-Xmx6144m -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g

# 并行构建：10 个模块中有 9 个库模块互不依赖，并行编译收益巨大
org.gradle.parallel=true

# 按 CPU 核心数分配 Worker
org.gradle.workers.max=8

# 构建缓存 (跨次构建复用输出，对 CI 多 job 极其有效)
org.gradle.caching=true

# 配置缓存 (你已开启，保留)
org.gradle.configuration-cache=true

# Kotlin 编译守护进程 (允许并行编译 Kotlin 模块)
kotlin.compiler.execution.strategy=daemon
kotlin.daemon.jvmargs=-Xmx3g

# KSP 增量编译
ksp.incremental=true

# Android 相关
android.useAndroidX=true
android.nonTransitiveRClass=true
android.enableAdditionalTestOutput=true

# Kotlin 代码风格
kotlin.code.style=official

# Gradle 企业插件 (本地禁用，CI 不相关)
org.gradle.console=verbose
